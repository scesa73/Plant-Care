<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bethlehem Plant Care OS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --planta: #388e3c; --bg: #f5f5f5; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .info h3 { margin: 0; font-size: 18px; }
        .info p { margin: 5px 0 0; font-size: 14px; color: #666; }
        button { background: var(--planta); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .status { font-weight: bold; font-size: 12px; padding: 4px 8px; border-radius: 5px; }
        .thirsty { background: #ffebee; color: #c62828; }
        .ok { background: #e8f5e9; color: #2e7d32; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color: #2e7d32; text-align: center;">My Collection</h1>
        <div id="plant-list"></div>
    </div>

    <script>
        const plants = [
            { id: 'p1', name: 'ZZ Plant', interval: 40 },
            { id: 'p2', name: 'String of Pearls', interval: 18 },
            { id: 'p3', name: 'Pathos', interval: 7 },
            { id: 'p4', name: 'Rhipsalis', interval: 10 },
            { id: 'p5', name: 'Brasil', interval: 7 },
            { id: 'p6', name: 'Snake Plant', interval: 40 },
            { id: 'p7', name: 'Money Tree', interval: 9 }
        ];

        function render() {
            const list = document.getElementById('plant-list');
            list.innerHTML = '';
            
            plants.forEach(p => {
                const last = localStorage.getItem('last_' + p.id);
                let statusText = 'Need Water';
                let statusClass = 'thirsty';
                
                if (last) {
                    const diff = Math.floor((new Date() - new Date(last)) / (1000 * 60 * 60 * 24));
                    const remaining = p.interval - diff;
                    if (remaining > 0) {
                        statusText = `OK (${remaining}d left)`;
                        statusClass = 'ok';
                    }
                }

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="info">
                        <h3>${p.name}</h3>
                        <span class="status ${statusClass}">${statusText}</span>
                    </div>
                    <button onclick="water('${p.id}')">Log Water</button>
                `;
                list.appendChild(card);
            });
        }

        window.water = function(id) {
            const today = new Date().toISOString().split('T')[0];
            localStorage.setItem('last_' + id, today);
            render();
        };

        render();
    </script>
</body>
</html>
